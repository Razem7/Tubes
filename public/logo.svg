<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 36" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Icon box -->
  <rect width="36" height="36" rx="9" fill="url(#bgGrad)"/>
  <!-- Smartphone outline -->
  <rect x="11" y="5" width="14" height="26" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <!-- Home button dot -->
  <circle cx="18" cy="27" r="1.4" fill="white"/>
  <!-- Speaker line -->
  <line x1="15" y1="8.5" x2="21" y2="8.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Text: GadgetHub -->
  <text x="44" y="14" font-family="'Inter','Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#1e40af" letter-spacing="0.3">Gadget</text>
  <text x="44" y="27" font-family="'Inter','Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#3b82f6" letter-spacing="0.3">Hub</text>
</svg>
